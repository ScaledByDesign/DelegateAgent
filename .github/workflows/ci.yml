name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Format check
        run: npm run format:check

      # Phase 1.7 (Archon port): regenerate the gitignored bundled-defaults
      # codegen output from `workflows/archon-*/workflow.yaml` so the static
      # import in `dag-loader.ts` resolves under the bare `npx tsc` /
      # `npx vitest` commands below. Schema validation runs INSIDE the
      # codegen (`build-bundled-workflows.ts` calls
      # `workflowDefinitionSchema.safeParse` and throws on failure), so a
      # broken YAML fails this step before it reaches typecheck.
      - name: Generate bundled workflows
        run: npm run prebuild

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run
